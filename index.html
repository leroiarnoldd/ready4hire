<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ready 4 Hire — Compare carpet cleaning machine hire, book verified patio and EOT cleaning professionals across 17 UK cities. Free for consumers, always." />
    <meta name="theme-color" content="#1B5E20" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ready 4 Hire — UK Carpet, Patio and EOT Cleaning" />
    <meta property="og:description" content="Compare carpet cleaning machine hire from £22/day. Book verified local professionals. 469+ listed businesses across 17 UK cities." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ready4hire.co.uk" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

    <!-- Google Analytics — replace G-XXXXXXXXXX with your real Measurement ID -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script> -->

    <title>Ready 4 Hire — UK Carpet, Patio and EOT Cleaning</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F1F8F1; }
      #root { min-height: 100vh; }
      /* Loading spinner shown before React mounts */
      #loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #F1F8F1; z-index: 9999;
        font-family: -apple-system, sans-serif;
        flex-direction: column; gap: 16px;
      }
      #loading .logo { font-size: 24px; color: #1B5E20; font-weight: 700; }
      #loading .logo span { color: #F5A800; }
      #loading .spinner {
        width: 32px; height: 32px;
        border: 3px solid #C8E6C9;
        border-top-color: #1B5E20;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <!-- Loading state shown before React boots -->
    <div id="loading">
      <div class="logo">Ready <span>4</span> Hire</div>
      <div class="spinner"></div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- React + Babel (CDN — swap for bundled build in production) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Your app -->
    <script type="text/babel" src="Ready4Hire.jsx" data-presets="react"></script>

    <script>
      // Hide loading spinner once React has mounted
      // React will call this after first render via a small hook in the app
      window.__r4hReady = function() {
        var el = document.getElementById('loading');
        if (el) el.style.display = 'none';
      };
      // Fallback: hide after 4 seconds regardless
      setTimeout(function() {
        var el = document.getElementById('loading');
        if (el) el.style.display = 'none';
      }, 4000);
    </script>

  </body>
</html>
