  <title>Ready 4 Hire — UK Carpet, Patio and EOT Cleaning</title>
  <style>

    #root{min-height:100vh}

    .spinner{width:36px;height:36px;border:3px solid #C8E6C9;border-top-color:#1B5E20;border-radius:50%;animation:spin 0.8s linear infinite}

  <div id="loading">
    <div class="logo">Ready <span>4</span> Hire</div>
    <div class="spinner"></div>
