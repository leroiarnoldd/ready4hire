<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Auth — Ready 4 Hire</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --green-dark:#1B5E20;
  --green-mid:#2E7D32;
  --green-light:#C8E6C9;
  --green-bg:#F1F8F1;
  --amber:#F5A800;
  --amber-dark:#E09600;
  --text:#1a1a1a;
  --text-muted:#6B7280;
  --border:#E5E7EB;
  --white:#ffffff;
  --radius:12px;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.14);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--green-bg);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

/* Auth Card */
.auth-card{
  background:var(--white);
  border-radius:20px;
  box-shadow:var(--shadow-lg);
  width:100%;
  max-width:440px;
  overflow:hidden;
}

.auth-header{
  background:var(--green-dark);
  padding:32px 40px 28px;
  text-align:center;
  position:relative;
}

.auth-header::after{
  content:'';
  position:absolute;
  bottom:-1px;left:0;right:0;
  height:24px;
  background:var(--white);
  border-radius:24px 24px 0 0;
}

.logo{
  font-family:'DM Serif Display',serif;
  font-size:26px;
  color:var(--white);
  margin-bottom:4px;
}
.logo span{color:var(--amber)}

.auth-tagline{
  font-size:13px;
  color:rgba(255,255,255,0.65);
  font-weight:400;
}

.auth-body{
  padding:32px 40px 40px;
}

/* Tabs */
.tab-row{
  display:flex;
  background:#F3F4F6;
  border-radius:10px;
  padding:4px;
  margin-bottom:28px;
  gap:4px;
}

.tab-btn{
  flex:1;
  padding:9px 12px;
  border:none;
  background:transparent;
  border-radius:8px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  color:var(--text-muted);
  cursor:pointer;
  transition:all 0.2s;
}

.tab-btn.active{
  background:var(--white);
  color:var(--green-dark);
  box-shadow:0 1px 6px rgba(0,0,0,0.1);
}

/* Forms */
.auth-form{display:none}
.auth-form.active{display:block}

.field{margin-bottom:18px}

.field label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--text);
  margin-bottom:6px;
}

.field input, .field select{
  width:100%;
  padding:11px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  color:var(--text);
  background:var(--white);
  transition:border-color 0.2s, box-shadow 0.2s;
  outline:none;
  appearance:none;
}

.field input:focus, .field select:focus{
  border-color:var(--green-mid);
  box-shadow:0 0 0 3px rgba(46,125,50,0.1);
}

.field input.error{border-color:#EF4444}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Role selector */
.role-cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.role-card{
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:14px 12px;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
}

.role-card:hover{border-color:var(--green-mid)}

.role-card input[type=radio]{display:none}

.role-card.selected{
  border-color:var(--green-mid);
  background:#F0FBF0;
}

.role-card .role-icon{font-size:24px;margin-bottom:6px}
.role-card .role-name{font-size:13px;font-weight:600;color:var(--text)}
.role-card .role-desc{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Password field */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  padding:0;display:flex;align-items:center;
}

/* Submit button */
.btn-primary{
  width:100%;
  padding:13px;
  background:var(--green-dark);
  color:var(--white);
  border:none;
  border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:background 0.2s, transform 0.1s;
  margin-top:4px;
}

.btn-primary:hover{background:var(--green-mid)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{background:#9CA3AF;cursor:not-allowed;transform:none}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
  color:var(--text-muted);font-size:12px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Google button */
.btn-google{
  width:100%;
  padding:12px;
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  color:var(--text);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.btn-google:hover{border-color:#9CA3AF;box-shadow:var(--shadow)}

.google-icon{width:18px;height:18px}

/* Error / success messages */
.msg{
  padding:10px 14px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:16px;
  display:none;
}
.msg.error{background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5}
.msg.success{background:#F0FDF4;color:#16A34A;border:1px solid #86EFAC}
.msg.show{display:block}

/* Password strength */
.pw-strength{margin-top:6px;display:none}
.pw-strength.show{display:block}
.strength-bar{
  height:3px;border-radius:99px;
  background:var(--border);
  overflow:hidden;margin-bottom:4px;
}
.strength-fill{height:100%;width:0%;transition:width 0.3s,background 0.3s;border-radius:99px}
.strength-label{font-size:11px;color:var(--text-muted)}

/* Forgot link */
.forgot-link{
  font-size:12px;color:var(--green-mid);
  text-decoration:none;float:right;margin-top:-14px;margin-bottom:8px;display:block;
}
.forgot-link:hover{text-decoration:underline}

/* Terms */
.terms-note{
  font-size:11px;color:var(--text-muted);
  text-align:center;margin-top:16px;line-height:1.6;
}
.terms-note a{color:var(--green-mid);text-decoration:none}
.terms-note a:hover{text-decoration:underline}

/* Loading spinner in button */
.spinner-sm{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:inline-block;vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-header">
    <div class="logo">Ready <span>4</span> Hire</div>
    <div class="auth-tagline">UK's trusted cleaning professionals directory</div>
  </div>

  <div class="auth-body">
    <!-- Tabs -->
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Sign In Form -->
    <form class="auth-form active" id="form-signin" onsubmit="handleSignIn(event)">
      <div class="msg error" id="signin-error"></div>
      <div class="msg success" id="signin-success"></div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" required/>
      </div>

      <div class="field">
        <label>Password</label>
        <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a>
        <div class="pw-wrap">
          <input type="password" id="signin-pw" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('signin-pw',this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="signin-btn">Sign In</button>

      <div class="divider">or</div>
      <button type="button" class="btn-google" onclick="handleGoogleAuth()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </form>

    <!-- Sign Up Form -->
    <form class="auth-form" id="form-signup" onsubmit="handleSignUp(event)">
      <div class="msg error" id="signup-error"></div>
      <div class="msg success" id="signup-success"></div>

      <div class="field">
        <label>I am a…</label>
        <div class="role-cards">
          <label class="role-card selected" id="role-user-card">
            <input type="radio" name="role" value="user" checked onchange="selectRole(this)"/>
            <div class="role-icon">🏠</div>
            <div class="role-name">Customer</div>
            <div class="role-desc">Looking for services</div>
          </label>
          <label class="role-card" id="role-business-card">
            <input type="radio" name="role" value="business_owner" onchange="selectRole(this)"/>
            <div class="role-icon">🏢</div>
            <div class="role-name">Business Owner</div>
            <div class="role-desc">List my services</div>
          </label>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>First name</label>
          <input type="text" id="signup-first" placeholder="Jane" autocomplete="given-name" required/>
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" id="signup-last" placeholder="Smith" autocomplete="family-name" required/>
        </div>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required/>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="signup-pw" placeholder="Min. 8 characters" autocomplete="new-password" required oninput="checkStrength(this.value)"/>
          <button type="button" class="pw-toggle" onclick="togglePw('signup-pw',this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength" id="pw-strength">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label"></div>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="signup-btn">Create Account</button>

      <div class="divider">or</div>
      <button type="button" class="btn-google" onclick="handleGoogleAuth()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <p class="terms-note">
        By creating an account you agree to our
        <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>
      </p>
    </form>
  </div>
</div>

<script type="module">
// ============================================================
// Supabase Auth — replace with your project URL and anon key
// ============================================================
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://drvatxcmpunpzvkyesxc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRydmF0eGNtcHVucHp2a3llc3hjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTE5MjgsImV4cCI6MjA5MjAyNzkyOH0.Lys82d0coEOCoRqkh2FEsI64-ymX_jAz5XF3VZIDwm4';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---- Tab switching ----
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='signup')));
  document.querySelectorAll('.auth-form').forEach((f,i)=>f.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='signup')));
};

// ---- Role selection ----
window.selectRole = function(radio) {
  document.getElementById('role-user-card').classList.toggle('selected', radio.value==='user');
  document.getElementById('role-business-card').classList.toggle('selected', radio.value==='business_owner');
};

// ---- Password visibility ----
window.togglePw = function(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
};

// ---- Password strength ----
window.checkStrength = function(pw) {
  const el = document.getElementById('pw-strength');
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  el.classList.add('show');
  let score = 0;
  if(pw.length >= 8) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  const colors=['#EF4444','#F97316','#EAB308','#22C55E'];
  const labels=['Weak','Fair','Good','Strong'];
  fill.style.width = (score*25)+'%';
  fill.style.background = colors[score-1]||'#E5E7EB';
  label.textContent = score > 0 ? labels[score-1] : '';
  label.style.color = colors[score-1]||'var(--text-muted)';
};

// ---- Show message ----
function showMsg(id, text, type='error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.className = 'msg';
}

// ---- Loading state ----
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner-sm"></span>Please wait…' : btn.dataset.label || btn.textContent;
  if(!btn.dataset.label && loading) btn.dataset.label = btn.textContent.replace(/<[^>]+>/g,'');
}

// ---- Sign In ----
window.handleSignIn = async function(e) {
  e.preventDefault();
  clearMsg('signin-error'); clearMsg('signin-success');
  const email = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-pw').value;
  setLoading('signin-btn', true);

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  setLoading('signin-btn', false);

  if(error) { showMsg('signin-error', error.message); return; }

  // Redirect based on role
  const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
  const dest = profile?.role === 'business_owner' ? '/dashboard.html' : '/index.html';
  showMsg('signin-success', 'Signed in! Redirecting…', 'success');
  setTimeout(() => window.location.href = dest, 1000);
};

// ---- Sign Up ----
window.handleSignUp = async function(e) {
  e.preventDefault();
  clearMsg('signup-error'); clearMsg('signup-success');
  const first = document.getElementById('signup-first').value.trim();
  const last = document.getElementById('signup-last').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-pw').value;
  const role = document.querySelector('input[name="role"]:checked').value;

  if(password.length < 8) { showMsg('signup-error','Password must be at least 8 characters'); return; }
  setLoading('signup-btn', true);

  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { data: { full_name: `${first} ${last}`, role } }
  });
  setLoading('signup-btn', false);

  if(error) { showMsg('signup-error', error.message); return; }

  // Update profile role
  if(data.user) {
    await supabase.from('profiles').update({ role, full_name: `${first} ${last}` }).eq('id', data.user.id);
  }

  showMsg('signup-success', 'Account created! Check your email to confirm, then sign in.', 'success');
};

// ---- Google OAuth ----
window.handleGoogleAuth = async function() {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/auth-callback.html' }
  });
};

// ---- Forgot password ----
window.handleForgotPassword = async function(e) {
  e.preventDefault();
  const email = document.getElementById('signin-email').value.trim();
  if(!email) { showMsg('signin-error','Enter your email above first'); return; }
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });
  if(error) showMsg('signin-error', error.message);
  else showMsg('signin-success', 'Password reset email sent!', 'success');
};

// ---- Check existing session ----
const { data: { session } } = await supabase.auth.getSession();
if(session) window.location.href = '/index.html';
</script>
</body>
</html>
